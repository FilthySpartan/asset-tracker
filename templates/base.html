<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{% block title %}VuePoint Asset Tracker{% endblock %}</title>
    <style>
        form input, form select, form textarea {
            width: 100%;
            padding: 0.375rem 0.75rem;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            margin-bottom: 0.5rem;
        }
        form label {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
       
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'assets:asset_list' %}">VuePoint Asset Tracker</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="{% url 'assets:asset_list' %}">Assets</a>
                <a class="nav-link" href="{% url 'assets:asset_assignment_list' %}">Assignments</a>
            </div>
            <div class="navbar-nav">
                {% if user.is_authenticated %}
                    <span class="nav-link text-light">{{ user.username }}</span>
                    <a class="nav-link" href="{% url 'accounts:login' %}">Logout</a>
                {% else %}
                    <a class="nav-link" href="{% url 'accounts:login' %}">Login</a>
                    <a class="nav-link" href="{% url 'accounts:register' %}">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
