<div class="row justify-content-center">
    <div class="col-md-6">
        <h1>{{ delete_title }}</h1>
        <p>Are you sure you want to delete "{{ object_name }}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, delete</button>
            <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
