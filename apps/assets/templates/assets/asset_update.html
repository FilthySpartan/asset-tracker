
    {% extends "base.html" %}

    {% block title %}Update Asset{% endblock %}

    {% block content %}
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1>Edit Asset</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_div }}
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a href="{% url 'assets:asset_list' %}">Cancel</a>
                </form>
            </div>
        </div>
    {% endblock %}
