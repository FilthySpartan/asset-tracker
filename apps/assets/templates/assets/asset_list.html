
    {% extends "base.html" %}

    {% block title %}Assets{% endblock %}

    {% block content %}
    <h1>Assets</h1>

    {% for asset in assets %}
        <p>
            <a href="{% url 'assets:asset_detail' asset.id %}">
            {{ asset.asset_name }} - {{ asset.get_type_display }} - {{ asset.get_status_display }}
            </a>
        </p>
    {% endfor %}

    {% endblock %}
